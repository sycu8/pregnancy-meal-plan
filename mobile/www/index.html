<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#bd5f42" />
    <title>Bầu Ăn Gì?</title>
    <link rel="stylesheet" href="css/shell.css" />
  </head>
  <body>
    <main class="shell" role="main" aria-busy="true" aria-label="Đang tải ứng dụng">
      <div class="shell__card">
        <div class="shell__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect width="64" height="64" rx="18" fill="#bd5f42" />
            <path
              d="M32 50s-18-10.8-22-24.1C7.7 18 12.4 12 19.3 12c4.1 0 7.6 2.2 9.7 5.5C31.1 14.2 34.6 12 38.7 12 45.6 12 50.3 18 48 25.9 44 39.2 32 50 32 50Z"
              fill="#fffaf5"
            />
            <path
              d="M13 31h8l4-8 7 18 5-11h14"
              fill="none"
              stroke="#287a69"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1 class="shell__title">Bầu Ăn Gì?</h1>
        <p class="shell__subtitle" id="shell-status">Đang mở thực đơn cho mẹ bầu…</p>
        <div class="shell__spinner" aria-hidden="true"></div>
        <p class="shell__hint">Cần kết nối Internet để tải nội dung mới nhất.</p>
      </div>
    </main>
    <script src="js/app.js" defer></script>
  </body>
</html>
