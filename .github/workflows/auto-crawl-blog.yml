name: Auto crawl blog (every 24h)

on:
  workflow_dispatch: {}
  schedule:
    # Every 24 hours at 09:15 Vietnam time (02:15 UTC)
    - cron: "15 2 * * *"

concurrency:
  group: auto-crawl-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl_publish_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BLOG_AUTO_PUBLISH_MAX: "10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Crawl sources + publish VI/EN overlays
        run: npm run publish:blog:auto

      - name: Run tests
        run: npm test

      - name: Commit and push (if changed)
        id: commit
        run: |
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes from crawl."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(blog): auto crawl $(date -u +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare
        if: steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:cloudflare
